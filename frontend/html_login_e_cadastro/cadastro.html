<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css"
        integrity="sha384-oS3vJWv+0UjzBfQzYUhtDYW+Pj2yciDJxpsK1OYPAYjqT085Qq/1cq5FLXAZQ7Ay" crossorigin="anonymous">
</head>

<body>
    <header>
        <nav class="menu" id="menu">
            <a href="../../index.html">Início</a>
            <a href="../html_main/sobre.html">Sobre</a>
            <a href="../html_main/livros.html">Livros</a>
            <a href="../html_main/contato.html">Contato</a>
        </nav>
    </header>
    <div class="container">
        <div class="content first-content">
            <div class="first-column">
                <img src="../img/logo.png" alt="">
            </div>
            <div class="second-column">
                <h2 class="title title-second">Cadastro</h2>
                <div class="social-media">
                </div><!-- social media -->
                <p class="description description-second">utilize seu e-mail para se cadastrar:</p>

                <form class="form" required>

                    <p id="legenda_de_dados">Email</p>
                    <label class="label-input" for="email">
                        <input type="email" id="email" name="email" placeholder=" Email" required>
                    </label>

                    <p id="legenda_de_dados">Senha</p>
                    <label class="label-input" for="senha">
                        <input type="password" id="senha" name="senha" placeholder=" Senha" required>
                    </label>

                    <p id="legenda_de_dados">Confirmar Senha</p>
                    <label class="label-input" for="confirmar_senha">
                        <input type="password" id="confirmar_senha" name="confirmar_senha"
                            placeholder=" Confirmar senha" required>
                    </label>

                    <p id="legenda_de_dados">Data de nascimento</p>
                    <label class="label-input" for="data_nasc">
                        <input type="date" id="data_nasc" name="data_nasc" required>
                    </label>

                    <button class="btn btn-second">logar</button>
                </form>
            </div><!-- second column -->
        </div><!-- first content -->
        <div class="content second-content">
            <div class="first-column">
                <h2 class="title title-primary">hello, friend!</h2>
                <p class="description description-primary">Enter your personal details</p>
                <p class="description description-primary">and start journey with us</p>
                <button id="signup" class="btn btn-primary">sign up</button>
            </div>
            <div class="second-column">
                <h2 class="title title-second">sign in to developer</h2>
                <div class="social-media">
                    <ul class="list-social-media">
                        <a class="link-social-media" href="#">
                            <li class="item-social-media">
                                <i class="fab fa-facebook-f"></i>
                            </li>
                        </a>
                        <a class="link-social-media" href="#">
                            <li class="item-social-media">
                                <i class="fab fa-google-plus-g"></i>
                            </li>
                        </a>
                        <a class="link-social-media" href="#">
                            <li class="item-social-media">
                                <i class="fab fa-linkedin-in"></i>
                            </li>
                        </a>
                    </ul>
                </div><!-- social media -->
                <p class="description description-second">or use your email account:</p>
                <form class="form">

                    <label class="label-input" for="">
                        <i class="far fa-envelope icon-modify"></i>
                        <input type="email" placeholder="Email">
                    </label>

                    <label class="label-input" for="">
                        <i class="fas fa-lock icon-modify"></i>
                        <input type="password" placeholder="Password">
                    </label>

                    <a class="password" href="#">forgot your password?</a>
                    <button class="btn btn-second">sign in</button>
                </form>
            </div><!-- second column -->
        </div><!-- second-content -->
    </div>
    <script src="../js/app.js" type="module"></script>
</body>

</html>
