<!DOCTYPE html>
<html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css"
        integrity="sha384-oS3vJWv+0UjzBfQzYUhtDYW+Pj2yciDJxpsK1OYPAYjqT085Qq/1cq5FLXAZQ7Ay" crossorigin="anonymous">
    
    <title>Contatos</title>

    <style>
        .container-contato {
            width: 90%;
            max-width: 700px; /* Largura máxima do formulário */
            margin: 40px auto; /* Centraliza na página */
            background-color: #fff; /* Fundo branco, como no login */
            border-radius: 15px; /* Bordas arredondadas */
            padding: 40px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); /* Sombra suave */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container-contato .form {
            width: 100%; /* O formulário ocupa 100% do container branco */
        }

        /* Ajuste para o textarea (campo de mensagem) */
        .container-contato .label-input textarea {
            height: 150px;
            width: 100%;
            border: none;
            background-color: #ecf0f1;
            padding: 10px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            resize: vertical; /* Permite que o usuário aumente a altura */
        }

        /* Ajuste para o ícone do textarea */
        .container-contato .label-input .icon-modify {
            padding-top: 12px;
            align-self: flex-start;
        }

    </style>
</head>
<body>

    <header>
        <div class="header-esquerda">
            <img src="../img/logo.png" alt="Logo Bibliovida" id="logo_home">
            
            <nav class="menu" id="menu">
                 <a href="../../index.html">Início</a> 
                 <a href="sobre.html">Sobre</a> 
                 <a href="livros.html">Livros</a> 
                 <a href="contato.html">Contato</a> 
            </nav>
        </div>

        <div id="login">
            <a href="../html_login_e_cadastro/login.html"><button class="botão_login">login</button></a> 
            <a href="../html_login_e_cadastro/cadastro.html"><button class="botão_login">Cadastro</button></a>
        </div>
    </header>

    <main>
        <h1 id="titulo_contatos">CONTATO</h1>

        <div class="container-contato">

            <h2 class="title title-second">Envie sua Mensagem</h2>
            
            <p class="description description-second" style="margin-bottom: 20px;">
                Tem alguma dúvida, sugestão ou quer doar livros?
            </p>

            <form class="form" action="#" method="post">
                
                <label class="label-input">
                    <i class="far fa-user icon-modify"></i>
                    <input type="text" placeholder="Seu Nome" required>
                </label>

                <label class="label-input">
                    <i class="far fa-envelope icon-modify"></i>
                    <input type="email" placeholder="Seu Email" required>
                </label>

                <label class="label-input" style="height: auto; align-items: flex-start;">
                    <i class="far fa-comment-dots icon-modify"></i>
                    <textarea placeholder="Sua Mensagem" required></textarea>
                </label>

                <button class="btn btn-second" style="align-self: center;">Enviar</button>
            </form>

            <div class="social-media" style="margin-top: 30px;">
                <ul class="list-social-media">
                    <a class="link-social-media" href="#">
                        <li class="item-social-media">
                            <i class="fab fa-facebook-f"></i>
                        </li>
                    </a>
                    <a class="link-social-media" href="#">
                        <li class="item-social-media">
                            <i class="fab fa-google-plus-g"></i>
                        </li>
                    </a>
                    <a class="link-social-media" href="#">
                        <li class="item-social-media">
                            <i class="fab fa-linkedin-in"></i>
                        </li>
                    </a>
                </ul>
            </div>

        </div> </main>

    <footer id="footer">
        <p id="letras_footer">&copy; 2025 Bibliovida. Todos os direitos reservados.</p>
    </footer>

    
<script type="module" src="../js/app.js"></script>

</body>
</html>
